<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1200, initial-scale=1" />
    <style>
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; overflow: hidden; width: 100%; }
      body {
        background: #f5f0e7;
        color: #183f38;
        font-family: Arial, Helvetica, sans-serif;
      }
      .card {
        height: 630px;
        overflow: hidden;
        padding: 68px 64px;
        position: relative;
        width: 1200px;
      }
      .copy { position: relative; width: 680px; z-index: 3; }
      h1 {
        font-size: 58px;
        letter-spacing: -3.2px;
        line-height: .98;
        margin: 0;
      }
      h1 span { color: #e6522c; display: block; margin-top: 10px; }
      .summary {
        color: #49665d;
        font-size: 23px;
        line-height: 1.38;
        margin: 34px 0 0;
        max-width: 500px;
      }
      .brand {
        align-items: center;
        bottom: 54px;
        display: flex;
        font-size: 25px;
        font-weight: 700;
        gap: 12px;
        left: 64px;
        letter-spacing: -1px;
        position: absolute;
      }
      .brand-mark {
        background: #e6522c;
        border-radius: 50%;
        height: 13px;
        width: 13px;
      }
      .desktop {
        background: #14352f;
        border: 1px solid #385b54;
        border-radius: 22px;
        box-shadow: 0 35px 70px -35px rgba(24, 63, 56, .62);
        height: 306px;
        left: 565px;
        overflow: hidden;
        position: absolute;
        top: 218px;
        width: 540px;
      }
      .desktop-bar {
        align-items: center;
        background: #102b26;
        border-bottom: 1px solid #31524b;
        display: flex;
        gap: 9px;
        height: 48px;
        padding: 0 19px;
      }
      .desktop-bar i { border-radius: 50%; height: 11px; width: 11px; }
      .desktop-bar i:nth-child(1) { background: #ef8059; }
      .desktop-bar i:nth-child(2) { background: #f3b849; }
      .desktop-bar i:nth-child(3) { background: #6fae74; }
      .desktop-body { display: grid; gap: 14px; padding: 25px; }
      .terminal-line { align-items: center; display: flex; gap: 10px; }
      .prompt { background: #6fae74; border-radius: 2px; height: 10px; width: 10px; }
      .line { background: #88a49b; border-radius: 4px; height: 8px; opacity: .62; }
      .line-a { width: 285px; }
      .line-b { width: 370px; }
      .line-c { width: 235px; }
      .tool {
        background: #193d36;
        border: 1px solid #31564f;
        border-radius: 9px;
        display: grid;
        gap: 9px;
        padding: 14px;
        width: 420px;
      }
      .tool .line { height: 7px; }
      .diff { display: grid; gap: 5px; margin-top: 3px; width: 430px; }
      .diff i { border-radius: 3px; height: 14px; opacity: .8; }
      .diff i:nth-child(1) { background: #4d776c; width: 350px; }
      .diff i:nth-child(2) { background: #965a51; width: 390px; }
      .diff i:nth-child(3) { background: #4f8b69; width: 415px; }
      .phone {
        filter: drop-shadow(0 32px 24px rgba(24, 63, 56, .22));
        height: 528px;
        object-fit: contain;
        position: absolute;
        right: 24px;
        top: 68px;
        width: 255px;
        z-index: 2;
      }
      .accent {
        background: #f3b849;
        border-radius: 999px;
        height: 12px;
        left: 520px;
        position: absolute;
        top: 91px;
        transform: rotate(-13deg);
        width: 74px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="copy">
        <h1>Leave your desk.<span>Keep your agents moving.</span></h1>
        <p class="summary">Claude Code, Codex, and more—from iOS, Android, and web.</p>
      </div>

      <div class="accent"></div>
      <div class="desktop" aria-hidden="true">
        <div class="desktop-bar"><i></i><i></i><i></i></div>
        <div class="desktop-body">
          <div class="terminal-line"><span class="prompt"></span><span class="line line-a"></span></div>
          <div class="tool"><span class="line line-c"></span><span class="line line-b"></span></div>
          <div class="diff"><i></i><i></i><i></i></div>
          <div class="terminal-line"><span class="prompt"></span><span class="line line-b"></span></div>
        </div>
      </div>
      <img class="phone" src="../public/happy-app.png" alt="" />

      <div class="brand"><span class="brand-mark"></span>Happy</div>
    </main>
  </body>
</html>
